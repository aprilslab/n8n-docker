services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "${N8N_BIND_IP:-0.0.0.0}:${N8N_PORT_PUBLIC:-5678}:5678"
    env_file:
      - ${N8N_ENV_FILE:-.env}
    volumes:
      - n8n_data:/home/node/.n8n

  caddy:
    image: caddy:latest
    restart: unless-stopped
    profiles:
      - https
    ports:
      - "80:80"
      - "443:443"
    environment:
      - N8N_HOST=${N8N_HOST}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - n8n

volumes:
  n8n_data:
  caddy_data:
  caddy_config:
